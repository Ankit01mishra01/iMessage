services:
  - type: web
    name: soen-backend
    env: node
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: GOOGLE_AI_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://soen-frontend.onrender.com

  - type: static
    name: soen-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://soen-backend.onrender.com